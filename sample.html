<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#ffd1dc,#ffe4e1);
margin:0;
overflow-x:hidden;
}

h1{
margin-top:40px;
}

/* Gift */

#gift{
font-size:120px;
cursor:pointer;
margin-top:120px;
transition:0.4s;
}

#gift:hover{
transform:scale(1.2);
}

#gift.open{
transform:scale(1.4) rotate(15deg);
}

/* Main content */

#mainContent{
display:none;
padding:20px;
}

/* Gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
max-width:900px;
margin:auto;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* Fullscreen photo */

#photoModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
flex-direction:column;
z-index:1000;
}

#photoModal img{
max-width:90%;
max-height:80%;
border-radius:10px;
}

#modalDate{
color:white;
margin-top:10px;
font-size:18px;
}

/* Videos */

video{
width:90%;
max-width:400px;
margin:15px;
border-radius:10px;
}

/* Floating hearts */

.heart{
position:fixed;
bottom:-30px;
font-size:24px;
animation:floatUp linear forwards;
}

@keyframes floatUp{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* Confetti */

.confetti{
position:fixed;
width:10px;
height:10px;
top:0;
animation:fall linear forwards;
}

@keyframes fall{

0%{
transform:translateY(-10vh) rotate(0);
}

100%{
transform:translateY(110vh) rotate(720deg);
}

}

</style>

</head>

<body>

<h1>Tap the Gift 🎁</h1>

<div id="gift" onclick="checkPassword()">🎁</div>

<div id="mainContent">

<h2>🎂 Happy Birthday 🎂</h2>

<p>This is a special memory surprise ❤️</p>

<h3>📸 Our Memories</h3>

<div class="gallery">

<img src="img1.jpeg" onclick="openPhoto(this,'15 Oct 2025')">
<img src="img2.jpeg" onclick="openPhoto(this,'23 Apr 2025')">
<img src="img3.jpeg" onclick="openPhoto(this,'15 Nov 2025')">
<img src="img4.jpeg" onclick="openPhoto(this,'03 Dec 2025')">
<img src="img5.jpeg" onclick="openPhoto(this,'13 Dec 2025')">
<img src="img6.jpeg" onclick="openPhoto(this,'01 May 2025')">
<img src="img7.jpeg" onclick="openPhoto(this,'1 Jan 2025')">
<img src="img8.jpeg" onclick="openPhoto(this,'13 May 2025')">
<img src="img9.jpeg" onclick="openPhoto(this,'01 May 2025')">
<img src="img11.jpeg" onclick="openPhoto(this,'23 Apr 2025')">
<img src="img12.jpeg" onclick="openPhoto(this,'12 Sep 2023')">
<img src="img10.jpeg" onclick="openPhoto(this,'NOT UPDATED')">
</div>

<h3>🎥 Special Videos</h3>

<video controls>
<source src="video1.mp4" type="video/mp4">
</video>

<video controls>
<source src="video2.mp4" type="video/mp4">
</video>

<h2>❤️ Final Message ❤️</h2>

<p>These memories will always stay special. Happy Birthday!</p>

</div>

<div id="photoModal" onclick="closePhoto()">
<img id="modalImg">
<div id="modalDate"></div>
</div>

<audio id="music" src="song.mp3"></audio>

<script>

function checkPassword(){

let password = prompt("Enter Who Am I To You?");

if(password === "THALAVALI"){

openGift();

}else{

alert("Wrong password 😅 Try again");

}

}

function openGift(){

let gift=document.getElementById("gift");

gift.classList.add("open");

setTimeout(()=>{

gift.style.display="none";

document.getElementById("mainContent").style.display="block";

document.getElementById("music").play();

startHearts();
startConfetti();

},600);

}

function startHearts(){

setInterval(()=>{

for(let i=0;i<5;i++){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*4+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},7000);

}

},1000);

}

function startConfetti(){

for(let i=0;i<120;i++){

let confetti=document.createElement("div");

confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";
confetti.style.background="hsl("+Math.random()*360+"deg,100%,50%)";
confetti.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(confetti);

setTimeout(()=>{
confetti.remove();
},6000);

}

}

function openPhoto(img,date){

document.getElementById("photoModal").style.display="flex";

document.getElementById("modalImg").src=img.src;

document.getElementById("modalDate").innerText=date;

}

function closePhoto(){

document.getElementById("photoModal").style.display="none";

}

</script>

</body>
</html>
